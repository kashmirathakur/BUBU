<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Congratulations ❤️</title>
<link rel="stylesheet" href="style.css">

<style>

body{
background:linear-gradient(135deg,#ff6fa5,#ffd6e7);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
background:white;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
color:#ff4081;
font-size:35px;
}

p{
font-size:20px;
margin-top:15px;
}

button{
margin-top:25px;
padding:15px 30px;
border:none;
border-radius:12px;
background:#ff4081;
color:white;
font-size:18px;
cursor:pointer;
}

.heart{
position:absolute;
font-size:30px;
animation:float 5s linear infinite;
}

@keyframes float{

0%{
transform:translateY(100vh);
opacity:1;
}

100%{
transform:translateY(-100vh);
opacity:0;
}

}

</style>

</head>

<body>

<div class="container">

<h1>🎉 Congratulations 🎉</h1>

<p>

❤️ You have successfully passed Bubu's Love Test ❤️

</p>

<p>

🎊 अभिनंदन! तू Bubu ची Love Test पास झाली आहेस! 🎊

</p>

<button onclick="alert('I Love You ❤️')">

Send Love ❤️

</button>

</div>

<script>

for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(heart);

}

</script>

</body>
</html>
