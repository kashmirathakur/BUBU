<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Take Selfie</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#ffd6e7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:90%;
    max-width:400px;
    background:white;
    padding:20px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

h1{
    color:#ff4081;
}

video,canvas{
    width:100%;
    border-radius:15px;
    border:3px solid #ff4081;
}

button{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#ff4081;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#e91e63;
}
</style>

</head>
<body>

<div class="container">

<h1>📸 Today's Selfie</h1>

<p>Take a live selfie to continue ❤️</p>

<video id="video" autoplay playsinline></video>

<canvas id="canvas" style="display:none;"></canvas>

<button id="captureBtn">📷 Capture Selfie</button>

<button id="continueBtn" style="display:none;">Continue ➜</button>

</div>

<script>

const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const captureBtn=document.getElementById("captureBtn");
const continueBtn=document.getElementById("continueBtn");

let stream;

// Open Front Camera
async function startCamera(){

try{

stream=await navigator.mediaDevices.getUserMedia({
video:{
facingMode:"user"
}
});

video.srcObject=stream;

}catch(error){

alert("Camera permission denied or not supported.");

}

}

startCamera();

// Capture Selfie
captureBtn.onclick=function(){

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

const ctx=canvas.getContext("2d");

ctx.drawImage(video,0,0);

video.style.display="none";
canvas.style.display="block";

stream.getTracks().forEach(track=>track.stop());

captureBtn.style.display="none";

continueBtn.style.display="block";

}

// Go to Questions
continueBtn.onclick=function(){

window.location.href="questions.html";

}

</script>

</body>
</html>
